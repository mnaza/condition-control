<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AC Remote</title>
<style>
 :root{--bg:#0e1116;--card:#181d25;--line:#2a313d;--txt:#e8ecf1;--dim:#8b95a5;--acc:#3ba55d}
 *{box-sizing:border-box}
 body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);
      max-width:430px;margin:0 auto;padding:14px 14px 28px}
 header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
 header h1{font-size:1.05em;margin:0;font-weight:600}
 .badges{display:flex;gap:6px;align-items:center;font-size:1.05em}
 .badges span{opacity:.35;filter:grayscale(1)}
 .badges span.up{opacity:1;filter:none}
 #bwifi{color:#5a6577;display:flex;align-items:center}
 #bwifi.up{color:var(--acc)}
 #lbtn{background:none;border:1px solid var(--line);color:var(--dim);border-radius:8px;
       padding:4px 10px;font-size:.85em;cursor:pointer}
 .hbtn{background:none;border:1px solid var(--line);border-radius:8px;
       padding:3px 8px;font-size:.95em;cursor:pointer;line-height:1.3}
 .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
       align-items:flex-start;justify-content:center;z-index:10;overflow-y:auto;
       -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
 .modal.open{display:flex}
 .mcard{background:var(--bg);border:1px solid var(--line);border-radius:16px;
       width:calc(100% - 24px);max-width:430px;margin:22px 12px;padding:4px 16px 16px}
 .mhead{display:flex;align-items:center;justify-content:space-between;margin:10px 0 2px}
 .mhead h2{font-size:1em;margin:0;font-weight:600}
 .mx{background:none;border:none;color:var(--dim);font-size:1.25em;cursor:pointer;padding:4px 8px}
 .dials{display:flex;gap:8px;justify-content:center;margin:8px 0 0}
 .dial2{position:relative;width:49%;max-width:205px}
 .dial2 svg{width:100%;display:block;touch-action:none;cursor:pointer}
 .dialc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
       justify-content:center;pointer-events:none}
 .dialc .dbg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
       font-size:4.6em;opacity:.34;line-height:1;color:#7d8aa0}
 .dialc .deg,.dialc .fdeg,.dialc .sub{position:relative}
 .dialc .deg{font-size:2.2em;font-weight:250;line-height:1}
 .dialc .fdeg{font-size:1.7em;line-height:1;color:var(--txt)}
 .dialc .sub{color:var(--dim);font-size:.75em;margin-top:5px}
 body.off .dialc .deg{color:var(--dim)}
 .pwr{width:100%;padding:15px;font-size:1.1em;border-radius:14px;border:none;cursor:pointer;
      background:var(--acc);color:#fff;font-weight:600;transition:background .2s}
 body:not(.off) .pwr{background:#c0392b}
 .lbl{color:var(--dim);font-size:.82em;margin:16px 0 6px;text-transform:uppercase;letter-spacing:.06em}
 .grid{display:grid;gap:8px}
 .g5{grid-template-columns:repeat(5,1fr)}
 .g4{grid-template-columns:repeat(4,1fr)}
 .grid button{padding:10px 2px 8px;border-radius:12px;border:1px solid var(--line);
      background:var(--card);color:var(--txt);cursor:pointer;display:flex;flex-direction:column;
      align-items:center;gap:3px;transition:all .15s}
 .grid button .i{font-size:1.35em;line-height:1.2}
 .grid button .t{font-size:.68em;color:var(--dim)}
 .grid button.on .t{color:#fff}
 .grid button.on{border-color:transparent}
 button.on[data-v="cool"]{background:#2471b8}
 button.on[data-v="heat"]{background:#c0522b}
 button.on[data-v="dry"]{background:#1f8a80}
 button.on[data-v="fan_only"]{background:#5d6d7e}
 button.on[data-v="auto"]{background:#6c5fb0}
 .grid button.on:not([data-v]){background:var(--acc)}
 .hint{color:var(--dim);font-size:.8em;margin:14px 0 4px}
 input,select{width:100%;padding:10px;margin:4px 0;background:var(--card);color:var(--txt);
      border:1px solid var(--line);border-radius:10px}
 form button,button.act{width:100%;padding:11px;margin-top:6px;border-radius:10px;cursor:pointer;
      border:1px solid var(--line);background:var(--card);color:var(--txt)}
 form button[type=submit],form button:not([type]){background:#2c3e50;border:none;color:#fff}
 #nets{margin:4px 0}
 .net{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:5px 0;cursor:pointer;
      border:1px solid var(--line);border-radius:10px;background:var(--card)}
 .net.sel{border-color:var(--acc)}
 .net svg{flex:none}
 .net .ssid{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
 .net .lk{color:var(--dim);font-size:.85em}
 .rule{border-bottom:1px dashed var(--line);padding-bottom:8px;margin-bottom:4px}
 .rrow{display:flex;gap:8px;align-items:center;margin-top:8px}
 .rrow input[type=checkbox]{width:22px;height:22px;flex:none}
 .rrow input[type=time]{flex:1;margin:0}
 .rrow select{flex:1;width:auto;margin:0}
 .rrow .del{flex:none;width:40px;padding:9px 0;border-radius:8px;border:1px solid var(--line);
      background:var(--card);color:var(--dim);cursor:pointer}
 .days{display:flex;gap:4px;margin-top:6px}
 .dc{flex:1;padding:6px 0;font-size:.75em;border-radius:8px;border:1px solid var(--line);
      background:var(--card);color:var(--dim);cursor:pointer}
 .dc.on{background:var(--acc);color:#fff;border-color:transparent}
</style></head><body class="off">
<header>
 <h1 id="hicon" style="display:flex;align-items:center"></h1>
 <div class="badges">
  <span id="bbat" class="up" style="font-size:.8em"></span>
  <button class="hbtn" id="bwifi" onclick="openM('wifm')" title="Wi-Fi"></button>
  <span id="bmqtt" title="MQTT">☁️</span>
  <button class="hbtn" onclick="openM('schm')" title="Schedule">⏰</button>
  <button class="hbtn" onclick="openM('infm')" title="Info">ℹ️</button>
  <button class="hbtn" onclick="openM('setm')" title="Settings">⚙️</button>
  <button id="lbtn" onclick="toggleLang()"></button>
 </div>
</header>

<div class="dials">
 <div class="dial2">
  <svg id="dialsvg" viewBox="0 0 220 220"></svg>
  <div class="dialc"><div class="dbg">🌡️</div><div class="deg" id="temp">--</div></div>
 </div>
 <div class="dial2">
  <svg id="fansvg" viewBox="0 0 220 220"></svg>
  <div class="dialc"><div class="dbg" id="fanbg"></div><div class="fdeg" id="fanic"></div><div class="sub" id="fanlbl"></div></div>
 </div>
</div>

<button class="pwr" id="pwr" onclick="send('power','toggle')">⏻</button>

<div class="lbl" data-i18n="mode"></div>
<div class="grid g5">
 <button data-k="mode" data-v="cool" onclick="send('mode','cool')"><span class="i">❄️</span><span class="t" data-i18n="cool"></span></button>
 <button data-k="mode" data-v="heat" onclick="send('mode','heat')"><span class="i">🔥</span><span class="t" data-i18n="heat"></span></button>
 <button data-k="mode" data-v="dry" onclick="send('mode','dry')"><span class="i">💧</span><span class="t" data-i18n="dry"></span></button>
 <button data-k="mode" data-v="fan_only" onclick="send('mode','fan_only')"><span class="i">🌀</span><span class="t" data-i18n="fan"></span></button>
 <button data-k="mode" data-v="auto" onclick="send('mode','auto')"><span class="i">Ⓐ</span><span class="t" data-i18n="auto"></span></button>
</div>


<div class="lbl" data-i18n="louver"></div>
<div class="grid g4">
 <button id="swing" style="grid-column:span 2" onclick="send('swing',st.swing?'off':'on')"><span class="i">↕️</span><span class="t" data-i18n="swing"></span></button>
</div>

<div id="schm" class="modal" onclick="if(event.target===this)closeM('schm')">
<div class="mcard">
 <div class="mhead"><h2>⏰ <span data-i18n="sched"></span></h2>
  <button class="mx" onclick="closeM('schm')">✕</button></div>
 <div id="rules"></div>
 <button type="button" class="act" onclick="addRule()" data-i18n="addrule"></button>
 <button type="button" class="act" style="background:#2c3e50;border:none;color:#fff"
   onclick="saveRules()" data-i18n="save_s"></button>
 <p class="hint" data-i18n="sched_hint"></p>
</div>
</div>

<div id="wifm" class="modal" onclick="if(event.target===this)closeM('wifm')">
<div class="mcard">
 <div class="mhead"><h2 style="display:flex;align-items:center;gap:8px"><span id="wfic"></span>Wi-Fi</h2>
  <button class="mx" onclick="closeM('wifm')">✕</button></div>
 <div id="wifd" class="hint"></div>
 <form id="wff" onsubmit="post(event,this,'/api/wifi')">
  <button type="button" class="act" id="scanb" onclick="scan(this)"></button>
  <div id="nets"></div>
  <input name="ssid" data-i18n-ph="ssid" required>
  <input name="pass" data-i18n-ph="password" type="password">
  <button data-i18n="save"></button>
 </form>
 <button type="button" class="act" onclick="apMode(this)" data-i18n="ap_go"></button>
 <p class="hint" data-i18n="ap_hint"></p>
</div>
</div>

<div id="setm" class="modal" onclick="if(event.target===this)closeM('setm')">
<div class="mcard">
 <div class="mhead"><h2>⚙️ <span data-i18n="settings"></span></h2>
  <button class="mx" onclick="closeM('setm')">✕</button></div>
 <p class="hint" data-i18n="proto_hint"></p>
 <select id="proto" onchange="postF('/api/protocol','p='+this.value).then(r=>r.json()).then(render)">
  <option value="electra">ELECTRA — AUX / Baxi / Rusklimat (YKR-*)</option>
  <option value="coolix">COOLIX — Midea / Coolix OEM</option>
  <option value="gree">GREE</option>
 </select>
 <div id="offvw">
 <p class="hint" data-i18n="offv_hint"></p>
 <select id="offv" onchange="postF('/api/offvariant','v='+this.value).then(r=>r.json()).then(render)">
  <option value="0">v1 — standard</option>
  <option value="1">v2 — byte9 |= 0x10</option>
  <option value="2">v3 — byte11 = 0x05 ✓</option>
  <option value="3">v4 — v2+v3</option>
 </select>
 </div>
 <p class="hint">MQTT / Home Assistant</p>
 <form id="mqf" onsubmit="post(event,this,'/api/mqtt')">
  <input name="host" data-i18n-ph="mq_host">
  <input name="port" data-i18n-ph="mq_port" inputmode="numeric">
  <input name="user" data-i18n-ph="mq_user">
  <input name="pass" data-i18n-ph="password" type="password">
  <button data-i18n="save"></button>
 </form>
 <p class="hint">🔒 <span data-i18n="webpw"></span></p>
 <p class="hint" id="pwhint"></p>
 <form id="pwf" onsubmit="savePw(event,this)">
  <input name="password" data-i18n-ph="password" type="password">
  <button data-i18n="save_pw"></button>
 </form>
</div>
</div>

<div id="infm" class="modal" onclick="if(event.target===this)closeM('infm')">
<div class="mcard">
 <div class="mhead"><h2>🩺 <span data-i18n="diag"></span></h2>
  <button class="mx" onclick="closeM('infm')">✕</button></div>
 <div id="diag" class="hint"></div>
 <p class="hint">📦 <span data-i18n="ota"></span></p>
 <button type="button" class="act" style="background:#2c3e50;border:none;color:#fff"
   onclick="ghUp(this)" data-i18n="ota_gh"></button>
 <div id="ghp" class="hint"></div>
 <input type="file" id="otaf" accept=".bin">
 <button type="button" class="act" onclick="otaUp(this)" data-i18n="ota_up"></button>
 <div id="otap" class="hint"></div>
</div>
</div>

<script>
const L={
 ru:{title:'Кондиционер',mode:'Режим',cool:'Холод',heat:'Тепло',dry:'Сушка',fan:'Вент.',
     auto:'Авто',fanspeed:'Вентилятор',low:'Мин',med:'Сред',high:'Макс',louver:'Жалюзи',
     swing:'Качание',settings:'Настройки',on:'Включить',off:'Выключить',set:'задано',
     proto_hint:'IR-протокол кондиционера:',
     offv_hint:'Кодировка выключения (v3 подтверждён для YKR-L/201E):',
     scan:'🔍 Найти сети',scanning:'Ищу сети…',pick:'— выберите сеть —',secured:'защищена',
     ssid:'Имя сети (SSID)',password:'Пароль',save:'Сохранить и перезагрузить',
     mq_host:'Адрес брокера (пусто — MQTT выключен)',mq_port:'Порт (1883)',
     mq_user:'Логин (не обязателен)',rebooting:'Перезагружаюсь…',bad:'Ошибка в данных',
     h:'ч',m:'м',d:'д',onpower:'на питании',
     diag:'Диагностика',d_up:'Аптайм',d_reset:'Последняя перезагрузка',
     d_heap:'Свободная память',d_rssi:'Сигнал Wi-Fi',d_ir:'ИК-команд отправлено',
     d_ver:'Версия',r_poweron:'включение питания',r_software:'программная',
     r_panic:'сбой (panic)',r_watchdog:'watchdog',r_brownout:'просадка питания (батарея?)',
     r_deepsleep:'deep sleep',r_external:'внешний сброс',r_unknown:'неизвестно',
     w_net:'Сеть',w_sig:'Сигнал',w_ip:'Адрес',w_on:'подключен',w_off:'выключен',
     ota:'Обновление прошивки (OTA)',ota_up:'Загрузить .bin',
     ota_gh:'⬆️ Обновить с GitHub',
     ap_go:'📡 Перейти в режим точки доступа',
     ap_hint:'Устройство перезагрузится и откроет сеть AC-Remote; пароль появится на экране устройства. Обычная перезагрузка вернёт домашний Wi-Fi.',
     ap_sure:'Устройство отключится от Wi-Fi и откроет свою точку доступа. Продолжить?',
     webpw:'Пароль веб-интерфейса',save_pw:'Сохранить',
     pw_open:'пароль не задан — управление открыто всей сети',
     pw_set:'пароль задан; пустое поле + Сохранить — убрать пароль',
     ota_pick:'Сначала выберите файл прошивки (.bin)',ota_done:'Готово, перезагружаюсь…',
     d_slot:'Слот прошивки',
     d_time:'Время устройства',sched:'Расписание',addrule:'+ Правило',
     save_s:'Сохранить расписание',saved:'Сохранено',act_on:'Включить',act_off:'Выключить',
     days:['Пн','Вт','Ср','Чт','Пт','Сб','Вс'],
     sched_hint:'Часы синхронизируются с интернетом; часовой пояс берётся из браузера при сохранении.'},
 en:{title:'Air Conditioner',mode:'Mode',cool:'Cool',heat:'Heat',dry:'Dry',fan:'Fan',
     auto:'Auto',fanspeed:'Fan speed',low:'Low',med:'Med',high:'High',louver:'Louver',
     swing:'Swing',settings:'Settings',on:'Turn on',off:'Turn off',set:'set to',
     proto_hint:'AC IR protocol:',
     offv_hint:'Power-off encoding (v3 confirmed for YKR-L/201E):',
     scan:'🔍 Scan networks',scanning:'Scanning…',pick:'— pick a network —',secured:'secured',
     ssid:'Network name (SSID)',password:'Password',save:'Save & reboot',
     mq_host:'Broker address (empty — MQTT off)',mq_port:'Port (1883)',
     mq_user:'Username (optional)',rebooting:'Rebooting…',bad:'Invalid input',
     h:'h',m:'m',d:'d',onpower:'on power',
     diag:'Diagnostics',d_up:'Uptime',d_reset:'Last reset',
     d_heap:'Free heap',d_rssi:'Wi-Fi signal',d_ir:'IR frames sent',
     d_ver:'Version',r_poweron:'power-on',r_software:'software',
     r_panic:'crash (panic)',r_watchdog:'watchdog',r_brownout:'brownout (battery?)',
     r_deepsleep:'deep sleep',r_external:'external reset',r_unknown:'unknown',
     w_net:'Network',w_sig:'Signal',w_ip:'Address',w_on:'connected',w_off:'off',
     ota:'Firmware update (OTA)',ota_up:'Upload .bin',
     ota_gh:'⬆️ Update from GitHub',
     ap_go:'📡 Switch to access-point mode',
     ap_hint:'The device reboots and opens the AC-Remote network; the password appears on its screen. A normal power-cycle returns it to your Wi-Fi.',
     ap_sure:'The device will drop off your Wi-Fi and open its own access point. Continue?',
     webpw:'Web UI password',save_pw:'Save',
     pw_open:'no password set — UI is open to the whole LAN',
     pw_set:'password set; save an empty field to remove it',
     ota_pick:'Pick a firmware file (.bin) first',ota_done:'Done, rebooting…',
     d_slot:'Firmware slot',
     d_time:'Device time',sched:'Schedule',addrule:'+ Rule',
     save_s:'Save schedule',saved:'Saved',act_on:'Turn on',act_off:'Turn off',
     days:['Mo','Tu','We','Th','Fr','Sa','Su'],
     sched_hint:'Clock syncs via internet (SNTP); timezone is taken from your browser on save.'}};
// NB: not named `lang` — inline onclick handlers are scoped `with(element)`,
// and every HTMLElement already has a `.lang` property that would shadow it.
let lng=localStorage.lang||((navigator.language||'en').startsWith('ru')?'ru':'en');
let st={};
function toggleLang(){lng=lng==='ru'?'en':'ru';localStorage.lang=lng;applyLang();}
function applyLang(){
 document.documentElement.lang=lng;
 document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=L[lng][e.dataset.i18n]);
 document.querySelectorAll('[data-i18n-ph]').forEach(e=>e.placeholder=L[lng][e.dataset.i18nPh]);
 document.getElementById('lbtn').textContent=lng==='ru'?'EN':'RU';
 document.getElementById('scanb').textContent=L[lng].scan;
 if(st.temp!==undefined)render(st);
 if(document.getElementById('diag').innerHTML)health();
 renderRules();
 drawPwHint();
}
function health(){fetch('/api/health').then(r=>r.json()).then(x=>{
 const up=x.uptime,dd=Math.floor(up/86400),hh=Math.floor(up%86400/3600),mm=Math.floor(up%3600/60);
 const ut=(dd?dd+L[lng].d+' ':'')+(hh?hh+L[lng].h+' ':'')+mm+L[lng].m;
 const rows=[[L[lng].d_up,ut],
  [L[lng].d_reset,L[lng]['r_'+x.reset]||x.reset],
  [L[lng].d_heap,Math.round(x.heap/1024)+' KB (min '+Math.round(x.heapMin/1024)+' KB)'],
  [L[lng].d_rssi,x.rssi?x.rssi+' dBm':'—'],
  [L[lng].d_time,x.time>1600000000?new Date(x.time*1000).toLocaleString():'—'],
  [L[lng].d_ir,x.irSends],[L[lng].d_ver,x.version+' (Rust)'],
  [L[lng].d_slot,x.slot||'—']];
 document.getElementById('diag').innerHTML=rows.map(r=>
  '<div style="display:flex;justify-content:space-between;padding:3px 0;'+
  'border-bottom:1px solid #232a35"><span>'+r[0]+'</span><span style="color:#e8ecf1">'
  +r[1]+'</span></div>').join('');});}
function openM(id){document.getElementById(id).classList.add('open');
 if(id==='infm')health();if(id==='wifm')wifiInfo();}
function closeM(id){document.getElementById(id).classList.remove('open');}
let lastRssi=0;
function drawWifi(){
 const b=document.getElementById('bwifi');
 b.classList.toggle('up',!!st.wifi);
 b.innerHTML=wifiFan(st.wifi?(lastRssi?level(lastRssi):4):0);
}
function wifiInfo(){
 const d=document.getElementById('wifd');d.textContent='…';
 fetch('/api/health').then(r=>r.json()).then(x=>{
  lastRssi=x.rssi;drawWifi();
  document.getElementById('wfic').innerHTML=wifiFan(x.rssi?level(x.rssi):0);
  const rows=[[L[lng].w_net,x.ssid||'—'],
   [L[lng].w_sig,x.rssi?x.rssi+' dBm':'—'],
   [L[lng].w_ip,location.hostname],
   ['MQTT',st.mqtt?L[lng].w_on:L[lng].w_off]];
  d.innerHTML=rows.map(r=>
   '<div style="display:flex;justify-content:space-between;padding:3px 0;'+
   'border-bottom:1px solid #232a35"><span>'+r[0]+'</span><span style="color:#e8ecf1">'
   +r[1]+'</span></div>').join('');
 }).catch(()=>{d.textContent='—';});
}
// Fan-blade icon: k blades around a hub.
function fanIco(k,sz){
 let s='<svg width="'+(sz||14)+'" height="'+(sz||14)+'" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px">';
 s+='<circle cx="8" cy="8" r="1.7"/>';
 for(let i=0;i<k;i++)s+='<g transform="rotate('+(i*360/k)+' 8 8)">'
  +'<path d="M8 8C5.6 6.6 5.3 2.8 8 1.5 10.7 2.8 10.4 6.6 8 8Z"/></g>';
 return s+'</svg>';
}
let rules=[];
function renderRules(){
 const c=document.getElementById('rules');c.innerHTML='';
 rules.forEach((r,i)=>{
  const row=document.createElement('div');row.className='rule';
  const top=document.createElement('div');top.className='rrow';
  const en=document.createElement('input');en.type='checkbox';en.checked=r.en;
  en.onchange=()=>r.en=en.checked;
  const t=document.createElement('input');t.type='time';
  t.value=String(Math.floor(r.min/60)).padStart(2,'0')+':'+String(r.min%60).padStart(2,'0');
  t.onchange=()=>{const p=t.value.split(':');r.min=(+p[0])*60+(+p[1]);};
  const a=document.createElement('select');
  [['1',L[lng].act_on],['0',L[lng].act_off]].forEach(v=>{
   const o=document.createElement('option');o.value=v[0];o.textContent=v[1];a.append(o);});
  a.value=r.on?'1':'0';a.onchange=()=>r.on=a.value==='1';
  const x=document.createElement('button');x.type='button';x.className='del';
  x.textContent='✕';x.onclick=()=>{rules.splice(i,1);renderRules();};
  top.append(en,t,a,x);
  const days=document.createElement('div');days.className='days';
  L[lng].days.forEach((dn,b)=>{
   const db=document.createElement('button');db.type='button';
   db.className='dc'+((r.days>>b&1)?' on':'');db.textContent=dn;
   db.onclick=()=>{r.days^=1<<b;db.classList.toggle('on');};days.append(db);});
  row.append(top,days);c.append(row);
 });
}
function addRule(){if(rules.length<8){rules.push({en:true,days:127,min:480,on:true});renderRules();}}
function saveRules(){
 const s=rules.map(r=>(r.en?1:0)+'|'+r.days+'|'+r.min+'|'+(r.on?1:0)).join(';');
 fetch('/api/schedule',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
  body:new URLSearchParams({rules:s,tz:-new Date().getTimezoneOffset()})})
 .then(r=>alert(r.ok?L[lng].saved:L[lng].bad));}
fetch('/api/schedule').then(r=>r.json()).then(x=>{rules=x.rules||[];renderRules();});
// Favicon drawn to match the header chip. Redrawn ONLY when the state
// actually changed: replacing the link on every 5 s poll makes Firefox
// abort the in-flight icon fetch (NS_BINDING_ABORTED noise).
let favKey='';
function favIcon(col,em,txt,on){
 const key=col+em+txt+on;
 if(key===favKey)return;
 favKey=key;
 const c=document.createElement('canvas');c.width=c.height=64;
 const g=c.getContext('2d');
 if(g.roundRect){g.beginPath();g.roundRect(0,0,64,64,16);g.fillStyle=col;g.fill();}
 else{g.fillStyle=col;g.fillRect(0,0,64,64);}
 g.textAlign='center';g.textBaseline='middle';
 g.globalAlpha=on?0.45:0.3;g.font='40px sans-serif';g.fillText(em,32,36);
 g.globalAlpha=1;g.font='700 '+(txt.length>3?20:28)+'px sans-serif';
 g.lineWidth=6;g.strokeStyle='rgba(0,0,0,.45)';g.strokeText(txt,32,32);
 g.fillStyle=on?'#fff':'#c8d0da';g.fillText(txt,32,32);
 const url=c.toDataURL('image/png');
 for(const[id,rel]of[['favl','icon'],['favla','apple-touch-icon']]){
  let l=document.getElementById(id);
  if(!l){l=document.createElement('link');l.id=id;l.rel=rel;document.head.append(l);}
  l.href=url;
 }
}
const MCOL={cool:'#2471b8',heat:'#c0522b',dry:'#1f8a80',fan_only:'#5d6d7e',auto:'#6c5fb0'};
function modeCol(){return st.power?(MCOL[st.mode&&st.mode!=='off'?st.mode:'cool']||'#3ba55d'):'#39414f';}
// Rotary dials: 270° arc, drag anywhere on the ring. Temp in half-degree
// steps (the IR frame rounds to whole degrees); fan snaps to 4 stops.
function dpol(r,aDeg){const a=(aDeg-90)*Math.PI/180;
 return [110+r*Math.cos(a),110+r*Math.sin(a)];}
function darc(r,a0,a1){const [x0,y0]=dpol(r,a0),[x1,y1]=dpol(r,a1);
 return 'M'+x0+' '+y0+'A'+r+' '+r+' 0 '+((a1-a0)>180?1:0)+' 1 '+x1+' '+y1;}
function evAng(svg,e){const r=svg.getBoundingClientRect();
 const x=e.clientX-(r.left+r.width/2),y=e.clientY-(r.top+r.height/2);
 return Math.min(135,Math.max(-135,Math.atan2(x,-y)*180/Math.PI));}
function fmtT(t2){return (t2%2?(t2-1)/2+'.5':t2/2)+'°';}
// value space: temp2 = doubled degrees, 32..64
const dsvg=document.getElementById('dialsvg');
let dialDrag=false;
function t2Ang(v){return -135+(Math.min(64,Math.max(32,v))-32)/32*270;}
function drawDial(t2){
 const col=modeCol(),a=t2Ang(t2),[kx,ky]=dpol(88,a);
 let ticks='';
 for(let tt=16;tt<=32;tt+=4){const p=dpol(66,t2Ang(tt*2));
  ticks+='<text x="'+p[0]+'" y="'+(p[1]+3)+'" text-anchor="middle" font-size="10" fill="#5a6577">'+tt+'</text>';}
 dsvg.innerHTML=
  '<path d="'+darc(88,-135,135)+'" stroke="#232a35" stroke-width="14" fill="none" stroke-linecap="round"/>'
  +'<path d="'+darc(88,-135,a)+'" stroke="'+col+'" stroke-width="14" fill="none" stroke-linecap="round"/>'
  +ticks
  +'<circle cx="'+kx+'" cy="'+ky+'" r="12" fill="#e8ecf1" stroke="'+col+'" stroke-width="4"/>';
}
function dialT2(e){return Math.round(32+(evAng(dsvg,e)+135)/270*32);}
dsvg.addEventListener('pointerdown',e=>{dialDrag=true;dsvg.setPointerCapture(e.pointerId);
 const v=dialT2(e);drawDial(v);document.getElementById('temp').textContent=fmtT(v);e.preventDefault();});
dsvg.addEventListener('pointermove',e=>{if(!dialDrag)return;
 const v=dialT2(e);drawDial(v);document.getElementById('temp').textContent=fmtT(v);});
dsvg.addEventListener('pointerup',e=>{if(!dialDrag)return;dialDrag=false;
 const v=dialT2(e);if(v!==Math.round(st.temp*2))send('temp',v/2);else drawDial(v);});
// Fan dial: 4 snapped stops (auto/low/medium/high).
const fsvg=document.getElementById('fansvg');
let fanDrag=false;
function fAng(i){return -135+i*90;}
function drawFan(i){
 const col=st.power?'#3ba55d':'#39414f',a=fAng(i),[kx,ky]=dpol(88,a);
 let ticks='';
 const names=[L[lng].auto,L[lng].low,L[lng].med,L[lng].high];
 for(let j=0;j<4;j++){const p=dpol(64,fAng(j));
  ticks+='<text x="'+p[0]+'" y="'+(p[1]+3)+'" text-anchor="middle" font-size="9.5" fill="'
   +(j===i?'#e8ecf1':'#5a6577')+'">'+names[j]+'</text>';}
 fsvg.innerHTML=
  '<path d="'+darc(88,-135,135)+'" stroke="#232a35" stroke-width="14" fill="none" stroke-linecap="round"/>'
  +'<path d="'+darc(88,-135,a)+'" stroke="'+col+'" stroke-width="14" fill="none" stroke-linecap="round"/>'
  +ticks
  +'<circle cx="'+kx+'" cy="'+ky+'" r="12" fill="#e8ecf1" stroke="'+col+'" stroke-width="4"/>';
 document.getElementById('fanic').innerHTML=i===0?'Ⓐ':fanIco([0,2,3,5][i],26);
 document.getElementById('fanlbl').textContent=names[i];
}
function fanFrom(e){return Math.round((evAng(fsvg,e)+135)/90);}
fsvg.addEventListener('pointerdown',e=>{fanDrag=true;fsvg.setPointerCapture(e.pointerId);
 drawFan(fanFrom(e));e.preventDefault();});
fsvg.addEventListener('pointermove',e=>{if(fanDrag)drawFan(fanFrom(e));});
fsvg.addEventListener('pointerup',e=>{if(!fanDrag)return;fanDrag=false;
 const i=fanFrom(e);if(FANS[i]!==st.fan)send('fan',FANS[i]);else drawFan(i);});
// Header chip: mode-colored plate, faint mode glyph behind the set temp.
function hIcon(){
 const on=st.power,m=st.mode&&st.mode!=='off'?st.mode:'cool';
 const col=on?(MCOL[m]||'#3ba55d'):'#232a35';
 const em={cool:'❄️',heat:'🔥',dry:'💧',fan_only:'🌀',auto:'Ⓐ'}[m]||'❄️';
 favIcon(col,em,st.temp!==undefined?st.temp+'°':'--',on);
 document.getElementById('hicon').innerHTML=
  '<svg width="52" height="34" viewBox="0 0 52 34">'
  +'<rect width="52" height="34" rx="10" fill="'+col+'"/>'
  +'<text x="26" y="26" font-size="21" text-anchor="middle" opacity="'+(on?'.45':'.3')+'">'+em+'</text>'
  +'<text x="26" y="23" font-size="'+(String(st.temp).length>2?11.5:15)
  +'" font-weight="700" text-anchor="middle" fill="'
  +(on?'#fff':'#8b95a5')+'" stroke="rgba(0,0,0,.45)" stroke-width="3" paint-order="stroke">'
  +(st.temp!==undefined?st.temp+'°':'--')+'</text></svg>';
}
function render(s){st=s;
 document.body.classList.toggle('off',!s.power);
 hIcon();
 if(!dialDrag){drawDial(Math.round(s.temp*2));
  document.getElementById('temp').textContent=fmtT(Math.round(s.temp*2));}
 document.getElementById('pwr').textContent='⏻ '+(s.power?L[lng].off:L[lng].on);
 document.querySelectorAll('button[data-k]').forEach(b=>{
  b.classList.toggle('on',st[b.dataset.k]===b.dataset.v);});
 if(!fanDrag)drawFan(Math.max(0,FANS.indexOf(s.fan)));
 document.getElementById('swing').classList.toggle('on',s.swing);
 document.getElementById('proto').value=s.proto;
 document.getElementById('offvw').style.display=s.proto==='electra'?'':'none';
 document.getElementById('offv').value=s.offVariant;
 drawWifi();
 document.getElementById('bmqtt').classList.toggle('up',s.mqtt);
 const b=document.getElementById('bbat');
 if(!s.battMv){b.textContent='';}
 else if(s.battChg){b.textContent='⚡'+s.battPct+'%';b.title=L[lng].onpower;}
 else{
  const t=s.battMin>=60?'~'+Math.round(s.battMin/60)+L[lng].h:'~'+s.battMin+L[lng].m;
  b.textContent=(s.battPct<20?'🪫':'🔋')+s.battPct+'% '+t;
  b.title=(s.battMv/1000).toFixed(2)+' V';
 }
}
function post(ev,f,url){ev.preventDefault();
 fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
   body:new URLSearchParams(new FormData(f))})
  .then(r=>alert(r.ok?L[lng].rebooting:L[lng].bad));}
let pwSet=false;
function drawPwHint(){document.getElementById('pwhint').textContent=L[lng][pwSet?'pw_set':'pw_open'];}
function apMode(btn){if(!confirm(L[lng].ap_sure))return;btn.disabled=true;
 postF('/api/apmode','').then(r=>alert(r.ok?L[lng].rebooting:L[lng].bad))
  .catch(()=>alert(L[lng].rebooting)).finally(()=>btn.disabled=false);}
function savePw(ev,f){ev.preventDefault();
 fetch('/api/webauth',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
   body:new URLSearchParams(new FormData(f))})
  .then(r=>{if(r.ok){f.password.value='';loadSet();}else alert(L[lng].bad);});}
// Classic WiFi "fan": dot + three arcs, lit up to the signal level (1..4).
function wifiFan(level){
 const c=i=>i<=level?'currentColor':'#39414f';
 return '<svg width="22" height="18" viewBox="0 0 24 20" fill="none">'
  +'<circle cx="12" cy="17" r="2" fill="'+c(1)+'"/>'
  +'<path d="M8.6 13.4a5 5 0 0 1 6.8 0" stroke="'+c(2)+'" stroke-width="2" stroke-linecap="round"/>'
  +'<path d="M5.6 10a9.5 9.5 0 0 1 12.8 0" stroke="'+c(3)+'" stroke-width="2" stroke-linecap="round"/>'
  +'<path d="M2.6 6.6a14 14 0 0 1 18.8 0" stroke="'+c(4)+'" stroke-width="2" stroke-linecap="round"/>'
  +'</svg>';
}
function level(rssi){return rssi>=-60?4:rssi>=-70?3:rssi>=-80?2:1;}
function scan(btn){btn.textContent=L[lng].scanning;btn.disabled=true;
 fetch('/api/scan').then(r=>r.json()).then(l=>{
  const s=document.getElementById('nets');s.innerHTML='';
  l.forEach(n=>{
   const d=document.createElement('div');d.className='net';
   d.innerHTML=wifiFan(level(n.rssi));
   const name=document.createElement('span');name.className='ssid';name.textContent=n.ssid;
   d.append(name);
   if(n.sec){const lk=document.createElement('span');lk.className='lk';lk.textContent='🔒';d.append(lk);}
   d.onclick=()=>{document.getElementById('wff').ssid.value=n.ssid;
    s.querySelectorAll('.net').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
   s.append(d);});})
 .finally(()=>{btn.textContent=L[lng].scan;btn.disabled=false;});}
function ghUp(btn){
 btn.disabled=true;
 const p=document.getElementById('ghp');p.textContent='…';
 postF('/api/update','').then(()=>{
  const t=setInterval(()=>fetch('/api/update/status').then(r=>r.json()).then(x=>{
   p.textContent=x.state;
   if(x.done){clearInterval(t);btn.disabled=false;}
  }).catch(()=>{p.textContent=L[lng].rebooting;clearInterval(t);btn.disabled=false;}),2000);
 }).catch(()=>{p.textContent=L[lng].bad;btn.disabled=false;});
}
function otaUp(btn){
 const f=document.getElementById('otaf').files[0],p=document.getElementById('otap');
 if(!f){alert(L[lng].ota_pick);return;}
 btn.disabled=true;
 const x=new XMLHttpRequest();
 x.open('POST','/api/ota');
 x.upload.onprogress=e=>{if(e.lengthComputable)p.textContent=Math.round(e.loaded/e.total*100)+'%';};
 x.onload=()=>{p.textContent=x.status===200?L[lng].ota_done:L[lng].bad;btn.disabled=false;};
 x.onerror=()=>{p.textContent=L[lng].bad;btn.disabled=false;};
 x.send(f);
}
const FANS=['auto','low','medium','high'];
function postF(url,body){return fetch(url,{method:'POST',
 headers:{'Content-Type':'application/x-www-form-urlencoded'},body});}
function send(k,v){postF('/api/set',k+'='+v).then(r=>r.json()).then(render);}
applyLang();
hIcon();
drawWifi();
document.getElementById('fanbg').innerHTML=fanIco(3,80);
drawDial(48);
drawFan(0);
// Poll only while the tab is visible (each request wakes the ESP32's
// radio from modem sleep — a hidden tab must not drain the battery).
// Own actions render instantly from the /api/set response; the poll only
// picks up outside changes (device buttons, MQTT/HA, schedule).
let pollT=null;
function poll(){fetch('/api/status').then(r=>r.json()).then(render).catch(()=>{});}
function setPoll(){
 clearInterval(pollT);pollT=null;
 if(!document.hidden){poll();pollT=setInterval(poll,15000);}
}
document.addEventListener('visibilitychange',setPoll);
setPoll();
function loadSet(){fetch('/api/mqtt').then(r=>r.ok?r.json():null).then(m=>{
 if(!m)return; // 401 with the prompt cancelled — keep whatever is shown
 const f=document.getElementById('mqf');
 f.host.value=m.host;f.port.value=m.port;f.user.value=m.user;
 pwSet=m.webpw;drawPwHint();}).catch(()=>{});}
loadSet();
</script></body></html>
