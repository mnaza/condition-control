# Fast host tests/lint of the pure ac-core crate, and a full xtensa
# firmware build (first run compiles ESP-IDF, later runs hit caches).
# On main pushes the build job also publishes a GitHub release with the
# OTA app image whenever the Cargo.toml version has no tag yet — the
# device's "Update from GitHub" button installs these.
name: CI

permissions:
  contents: write

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest
    env:
      # Override the workspace's rust-toolchain.toml (channel "esp").
      RUSTUP_TOOLCHAIN: stable
    defaults:
      run:
        working-directory: firmware-stick-rs/ac-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Test
        run: cargo test --target x86_64-unknown-linux-gnu
      - name: Clippy
        run: cargo clippy --target x86_64-unknown-linux-gnu -- -D warnings

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Xtensa Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        env:
          # espup queries the GitHub API for the latest release; without a
          # token shared runners hit the anonymous rate limit (403).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          default: true
          buildtargets: esp32
          ldproxy: true
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware-stick-rs
      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: firmware-stick-rs/.embuild
          key: espidf-${{ hashFiles('firmware-stick-rs/Cargo.lock', 'firmware-stick-rs/sdkconfig.defaults') }}
      - name: Build firmware
        working-directory: firmware-stick-rs
        run: cargo build --release
      - name: Install espflash
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cargo-bins/cargo-binstall@ead08b90bd7b2e6d81963fb9cf0b7239f66d5db4 # v1.21.0
      - name: Release OTA image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: firmware-stick-rs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo binstall -y espflash@4.5.0
          V=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if gh release view "v$V" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release v$V already exists, skipping"
            exit 0
          fi
          espflash save-image --chip esp32 \
            target/xtensa-esp32-espidf/release/firmware-stick-rs condition-control.bin
          gh release create "v$V" condition-control.bin \
            --repo "$GITHUB_REPOSITORY" --title "v$V" \
            --notes "$(git log -1 --pretty=%s)"
