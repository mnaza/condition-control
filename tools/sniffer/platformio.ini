; IR sniffer: decode the original remote if the ELECTRA_AC live test fails.
; Wire an IR receiver (TSOP38238 / M5 IR Unit) to the Grove port, data on G33.
[env:stickc_plus2]
platform = espressif32@^6.12.0
board = m5stick-c
framework = arduino
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified@^0.2.7
    crankyoldgit/IRremoteESP8266@^2.8.6
