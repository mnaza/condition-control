; Smart AC IR Remote — M5StickC Plus2 (IR bridge)
;
; The registry has no m5stick-c-plus2 board def, so we use m5stick-c
; (same ESP32-PICO family) and override flash size to the Plus2's 8MB.

[platformio]
default_envs = stickc_plus2

[env:stickc_plus2]
platform = espressif32@^6.12.0
board = m5stick-c
framework = arduino
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1
lib_deps =
    m5stack/M5Unified@^0.2.7
    crankyoldgit/IRremoteESP8266@^2.8.6
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.4.0

; Host-side unit tests for the pure-logic AC state module.
; Only ac_state.cpp is built here — everything else needs Arduino.
[env:native]
platform = native
test_framework = unity
test_build_src = true
build_flags = -std=c++17
build_src_filter = +<ac_state.cpp> +<web_api.cpp> +<electra_off.cpp>
